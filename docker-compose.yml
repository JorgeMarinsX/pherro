# Pherro — LOCAL DEVELOPMENT stack.
# Nuxt 4 (Bun) frontend + NestJS (Bun) backend + Postgres.
#
# Usage:
#   Start:  docker compose up -d
#   Stop:   docker compose down
#   Reset:  docker compose down -v && docker compose up -d

name: pherro

services:

  # ── Nuxt app (DEV: bun dev + HMR, source bind-mount) ──────────────────────
  app:
    image: oven/bun:latest
    working_dir: /app
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      NUXT_DEVTOOLS_ENABLED: "true"
      CONSOLA_LEVEL: "5"
      HOST: 0.0.0.0
      PORT: 3000
      NUXT_PUBLIC_BACKEND_URL: ${NUXT_PUBLIC_BACKEND_URL:-http://localhost:3001}
      BACKEND_URL: http://backend:3001
      TENANT_SLUG: ${TENANT_SLUG:-dev}
      BACKEND_ADMIN_TOKEN: ${BACKEND_ADMIN_TOKEN}
      SESSION_SECRET: ${SESSION_SECRET}
    volumes:
      - .:/app
      - app-node-modules:/app/node_modules
    ports:
      - "3000:3000"
    command: >
      sh -c "
        bun install &&
        bun --bun run dev --no-fork
      "

  # ── NestJS backend (DEV: bun --watch, source bind-mount) ──────────────────
  backend:
    image: oven/bun:latest
    working_dir: /app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-postgres}?schema=public
      TENANT_SLUG: ${TENANT_SLUG:-dev}
      BACKEND_ADMIN_TOKEN: ${BACKEND_ADMIN_TOKEN}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-7d}
    volumes:
      - ./backend:/app
      - backend-node-modules:/app/node_modules
    ports:
      - "3001:3001"
    command: >
      sh -c "
        bun install &&
        bunx prisma generate &&
        bunx prisma migrate deploy &&
        bun --bun --watch run src/main.ts
      "

  # ── Postgres ───────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    mem_limit: 512m
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      PGPORT: ${POSTGRES_PORT:-5432}
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db-data:
  app-node-modules:
  backend-node-modules:
