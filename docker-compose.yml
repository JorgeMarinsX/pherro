# Pherro — LOCAL DEVELOPMENT stack.
# Nuxt 4 (Bun) frontend + NestJS (Bun) backend + Postgres.
#
# Usage:
#   Start:  docker compose up -d
#   Stop:   docker compose down
#   Reset:  docker compose down -v && docker compose up -d

name: pherro

services:

  # ── Nuxt app (DEV: bun dev + HMR, source bind-mount) ──────────────────────
  app:
    image: oven/bun:latest
    working_dir: /app
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      NUXT_DEVTOOLS_ENABLED: "true"
      CONSOLA_LEVEL: "5"
      HOST: 0.0.0.0
      PORT: 3000
      BACKEND_URL: http://backend:3001
      BACKEND_ADMIN_TOKEN: ${BACKEND_ADMIN_TOKEN}
      SESSION_SECRET: ${SESSION_SECRET}
      APP_BASE_DOMAIN: ${APP_BASE_DOMAIN:-pherro.app}
    volumes:
      - .:/app
      - app-node-modules:/app/node_modules
    ports:
      - "3000:3000"
    command: >
      sh -c "
        bun install &&
        bun --bun run dev --no-fork
      "

  # ── NestJS backend (DEV: bun --watch, source bind-mount) ──────────────────
  backend:
    image: oven/bun:latest
    working_dir: /app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3001
      # Runtime = non-superuser role (superusers bypass RLS). Migrations = postgres.
      DATABASE_URL: postgresql://app_runtime:${APP_DB_PASSWORD}@db:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-postgres}?schema=public
      MIGRATE_DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-postgres}?schema=public
      # Dev-only: seed slug + fallback tenant for hosts that match no tenant (localhost).
      TENANT_SLUG: ${TENANT_SLUG:-dev}
      APP_BASE_DOMAIN: ${APP_BASE_DOMAIN:-pherro.app}
      BACKEND_ADMIN_TOKEN: ${BACKEND_ADMIN_TOKEN}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      PLATFORM_ADMIN_EMAIL: ${PLATFORM_ADMIN_EMAIL}
      PLATFORM_ADMIN_PASSWORD: ${PLATFORM_ADMIN_PASSWORD}
      TENANT_ADMIN_EMAIL: ${TENANT_ADMIN_EMAIL}
      TENANT_ADMIN_PASSWORD: ${TENANT_ADMIN_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-7d}
      # Billing (Asaas). Empty key = billing disabled, signup still works.
      ASAAS_API_KEY: ${ASAAS_API_KEY:-}
      ASAAS_BASE_URL: ${ASAAS_BASE_URL:-https://api-sandbox.asaas.com/v3}
      ASAAS_WEBHOOK_TOKEN: ${ASAAS_WEBHOOK_TOKEN:-}
      # E-mail (Resend). Empty key = sends skipped, flows still work.
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM: ${RESEND_FROM:-Pherro <onboarding@resend.dev>}
      # Absolute-URL building in e-mails (scheme/port; host comes from APP_BASE_DOMAIN).
      SITE_URL: ${SITE_URL:-http://localhost:3000}
      # Vehicle photo storage (local-disk driver; S3/CDN driver later).
      UPLOADS_DIR: /app/uploads
      UPLOAD_TRANSFORM_CONCURRENCY: ${UPLOAD_TRANSFORM_CONCURRENCY:-4}
    volumes:
      - ./backend:/app
      - backend-node-modules:/app/node_modules
      - uploads-data:/app/uploads
    ports:
      - "3001:3001"
    command: >
      sh -c "
        bun install &&
        bunx prisma generate &&
        DATABASE_URL=\"$$MIGRATE_DATABASE_URL\" bunx prisma migrate deploy &&
        bun run prisma/seed.ts &&
        bun --bun --watch run src/main.ts
      "

  # ── Postgres ───────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    mem_limit: 512m
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      PGPORT: ${POSTGRES_PORT:-5432}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD}
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db-data:
  app-node-modules:
  backend-node-modules:
  uploads-data:
