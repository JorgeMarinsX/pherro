name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run typecheck

  backend-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t pherro-backend-ci ./backend
      - name: Boot backend against Postgres + Redis, wait for /health
        run: |
          docker network create ci
          docker run -d --name db --network ci -e POSTGRES_PASSWORD=ci postgres:16-alpine
          docker run -d --name redis --network ci redis:7-alpine
          for i in $(seq 1 30); do
            docker exec db pg_isready -U postgres > /dev/null 2>&1 && break
            sleep 2
          done
          docker run -d --name backend --network ci -p 3001:3001 \
            -e NODE_ENV=production \
            -e PORT=3001 \
            -e DATABASE_URL='postgresql://postgres:ci@db:5432/postgres?schema=public' \
            -e MIGRATE_DATABASE_URL='postgresql://postgres:ci@db:5432/postgres?schema=public' \
            -e REDIS_URL='redis://redis:6379' \
            -e JWT_SECRET=ci-only-jwt-secret \
            -e BACKEND_ADMIN_TOKEN=ci-only-admin-token \
            -e APP_BASE_DOMAIN=ci.localhost \
            pherro-backend-ci
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:3001/health > /dev/null 2>&1; then
              echo "backend healthy"
              exit 0
            fi
            sleep 2
          done
          echo "backend never became healthy:"
          docker logs backend
          exit 1

  push-images:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [frontend-typecheck, backend-smoke]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { name: pherro-app, context: "." }
          - { name: pherro-backend, context: "backend" }
          - { name: pherro-backup, context: "ops/backup" }
          - { name: pherro-alerts, context: "ops/alerts" }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      # DOCKER_REGISTRY may include a namespace path; login wants the host only.
      - id: registry
        env:
          DOCKER_REGISTRY: ${{ secrets.DOCKER_REGISTRY }}
        run: echo "host=${DOCKER_REGISTRY%%/*}" >> "$GITHUB_OUTPUT"
      - uses: docker/login-action@v3
        with:
          registry: ${{ steps.registry.outputs.host }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ secrets.DOCKER_REGISTRY }}/${{ matrix.name }}:latest
            ${{ secrets.DOCKER_REGISTRY }}/${{ matrix.name }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [push-images]
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Portainer stack redeploy
        run: curl -fsS -X POST "${{ secrets.PORTAINER_WEBHOOK_URL }}"
